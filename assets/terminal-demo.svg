<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Task Tracker CLI terminal demo">
  <rect width="1200" height="675" rx="28" fill="#0f172a"/>
  <rect x="95" y="95" width="1010" height="485" rx="20" fill="#020617" stroke="#334155"/>
  <circle cx="135" cy="132" r="10" fill="#ef4444"/>
  <circle cx="170" cy="132" r="10" fill="#f59e0b"/>
  <circle cx="205" cy="132" r="10" fill="#22c55e"/>
  <g font-family="JetBrains Mono, Menlo, monospace" font-size="24">
    <text x="135" y="205" fill="#67e8f9">$ python3 app.py add "Write README"</text>
    <text x="135" y="250" fill="#cbd5e1">Added task: "Write README"</text>
    <text x="135" y="315" fill="#67e8f9">$ python3 app.py list</text>
    <text x="135" y="365" fill="#f8fafc">Task list:</text>
    <text x="135" y="405" fill="#94a3b8">--------------------------------------------------</text>
    <text x="135" y="450" fill="#f8fafc">[1] [x] Learn Python basics</text>
    <text x="135" y="495" fill="#f8fafc">[2] [ ] Write README</text>
    <text x="135" y="535" fill="#94a3b8">--------------------------------------------------</text>
  </g>
</svg>
